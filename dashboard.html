<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ad Campaign Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔝 NAVBAR -->
<div class="topbar">
  <h2>MyApp</h2>
  <div>
    <button class="blue-btn">Create Pages</button>
    <button class="blue-btn" onclick="openModal()">Create Campaign</button>
    <button class="red-btn">Logout</button>
  </div>
</div>

<!-- 📊 TABLE SECTION -->
<div class="table-container">

  <table>
    <thead>
      <tr>
        <th>Image</th>
        <th>Name</th>
        <th>Budget</th>
        <th>Start Date</th>
        <th>End Date</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="tableData">
      <!-- JS DATA -->
    </tbody>
  </table>

</div>
<!-- 🆕 CREATE PAGE MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">

    <h3>Create New Campaign</h3>

    <input id="pname" placeholder="Campaign Name">
    <input id="pbudget" type="number" placeholder="Budget">
    <input id="pstart" type="date">
    <input id="pend" type="date">

    <select id="pstatus">
      <option value="active">Active</option>
      <option value="paused">Paused</option>
      <option value="completed">Completed</option>
    </select>

    <div style="margin-top:10px;">
      <button onclick="savePage()">Save</button>
      <button onclick="closeModal()" style="background:red;">Cancel</button>
    </div>

  </div>
</div>

<!-- 🔁 PAGINATION -->
<div class="pagination">
  <button>⬅</button>
  <button>➡</button>
</div>

<script src="dashboard.js"></script>
</body>
</html>
